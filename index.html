<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>展示会 来場者管理</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:15px;
    text-align:center;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

h1{
    color:#333;
}

button{
    width:90%;
    max-width:320px;
    padding:18px;
    margin:8px auto;
    border:none;
    border-radius:12px;
    background:#4CAF50;
    color:white;
    font-size:18px;
    display:block;
}

.small-btn{
    width:auto;
    padding:10px 20px;
    font-size:16px;
}

#reader{
    width:100%;
    max-width:350px;
    margin:auto;
}

#scanMessage{

    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);

    background:#4CAF50;
    color:white;

    padding:20px 40px;

    border-radius:15px;

    font-size:30px;
    font-weight:bold;

    display:none;

    z-index:9999;
}

.duplicate{
    background:#d32f2f !important;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
}

th{
    background:#4CAF50;
    color:white;
}

</style>
</head>

<body>

<!-- ホーム画面 -->
<div id="homePage" class="page active">

    <h1>展示会 来場者管理</h1>

    <h2>
        読取件数：
        <span id="count">0</span>件
    </h2>

    <button onclick="openScanner()">
        QRコードを読む
    </button>

    <button onclick="showList()">
        一覧を見る
    </button>

    <button onclick="exportExcel()">
        Excel出力
    </button>

    <button onclick="backupData()">
        バックアップ
    </button>

</div>


<!-- スキャン画面 -->
<div id="scanPage" class="page">

    <button class="small-btn"
            onclick="goHome()">
        ← ホームへ戻る
    </button>

    <h2>QRコードを読み取ってください</h2>

    <div id="reader"></div>

</div>


<!-- 一覧画面 -->
<div id="listPage" class="page">

    <button class="small-btn"
            onclick="backHomeFromList()">
        ← ホームへ戻る
    </button>

    <h2>来場者一覧</h2>

    <table>

        <thead>
        <tr>
            <th>日時</th>
            <th>ID</th>
        </tr>
        </thead>

        <tbody id="history"></tbody>

    </table>

</div>

<div id="scanMessage"></div>

<audio id="beep">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script src="app.js"></script>

</body>
</html>
